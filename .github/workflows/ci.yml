# CI — every push/PR must compile-check cleanly before it can reach main.
name: ci
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      # Fails on ERRORS (code that won't compile / broken references).
      # Infos and style warnings don't block — errors do.
      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
