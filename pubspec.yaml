name: myassistant
description: MYASSISTANT — AI personal assistant for Android and iOS.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking — talks to the backend only; AI keys never live in the app
  http: ^1.2.2

  # Local storage for session + cached config
  shared_preferences: ^2.3.2

  # Updates
  package_info_plus: ^8.0.2      # reads the installed version
  url_launcher: ^6.3.0           # opens App Store on iOS
  in_app_update: ^4.2.3          # Play in-app updates (Android only)

  # Sign-in (F1) — wired but gated off until OAuth setup
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
