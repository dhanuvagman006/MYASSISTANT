name: myassistant
description: MYASSISTANT — AI personal assistant for Android and iOS.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Networking — talks to the backend only; AI keys never live in the app
  http: ^1.2.2

  # Brand typography — Sora (headlines) + Inter (body) per UI Design V1.0
  google_fonts: ^6.2.1

  # Voice — wake word watch + speech capture + spoken replies (A2, M1)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.1.0

  # Screen-off wake word: on-device detection + mic foreground service
  porcupine_flutter: ^3.0.4
  flutter_foreground_task: ^8.17.0

  # Local storage for session + cached config
  shared_preferences: ^2.3.2

  # Regional language from location (Karnataka -> Kannada etc.)
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # Cloud speech-to-text (Whisper via backend /stt) — records the
  # question as m4a; auto language detection, replaces flaky on-device
  # regional recognition. Device STT stays as wake word + fallback.
  record: ^6.1.1
  path_provider: ^2.1.4

  # Reminder notifications — fire even when the app is closed
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1

  # Updates
  package_info_plus: ^8.0.2      # reads the installed version
  url_launcher: ^6.3.0           # opens App Store on iOS
  in_app_update: ^4.2.3          # Play in-app updates (Android only)

  # Sign-in (F1) — email + Google + Apple, verified by the backend
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2
  flutter_secure_storage: ^9.2.2   # session token lives in Keystore/Keychain

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#0E1B1D"
  adaptive_icon_foreground: assets/icon/icon_fg.png

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/wake/
